<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nalam — Scan to Launch</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6B1C2E, #C8402A);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #FAF3E0;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 420px;
      width: 90%;
    }
    .app-name {
      font-size: 42px;
      font-weight: 900;
      color: #6B1C2E;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .app-tamil {
      font-size: 28px;
      color: #E8A020;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 13px;
      color: #9E8060;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #E8A020; }
    .dot.sm { width: 4px; height: 4px; background: #F5C96A; }
    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    #qrcode canvas, #qrcode img {
      border-radius: 12px;
      border: 4px solid #E8A020;
      padding: 8px;
      background: white;
    }
    .instructions {
      background: #F2D9B0;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      text-align: left;
      margin-bottom: 10px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      background: #E8A020;
      color: white;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-text { font-size: 13px; color: #5C3317; line-height: 1.4; }
    .step-text strong { color: #6B1C2E; }
    .url-box {
      background: #1C1B18;
      border-radius: 10px;
      padding: 10px 16px;
      font-family: monospace;
      font-size: 13px;
      color: #E8A020;
      word-break: break-all;
    }
    .same-wifi {
      font-size: 12px;
      color: #9E8060;
      margin-top: 16px;
    }
    .same-wifi span { color: #C8402A; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-tamil">நலம்</div>
    <div class="app-name">NALAM</div>
    <div class="tagline">Your Wellness · Your Roots</div>

    <div class="divider">
      <div class="dot"></div><div class="dot sm"></div>
      <div class="dot"></div><div class="dot sm"></div>
      <div class="dot"></div><div class="dot sm"></div>
      <div class="dot"></div>
    </div>

    <div id="qrcode"></div>

    <div class="instructions">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Install <strong>Expo Go</strong> from Play Store on your Android phone</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Connect your phone to <strong>the same Wi-Fi</strong> as this PC</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Open Expo Go → tap <strong>Scan QR Code</strong> → scan above</div>
      </div>
    </div>

    <div class="url-box">exp://10.23.23.152:8082</div>
    <div class="same-wifi">⚠️ Phone must be on <span>same Wi-Fi</span> as this PC</div>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "exp://10.23.23.152:8082",
      width: 240,
      height: 240,
      colorDark: "#6B1C2E",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>
</body>
</html>
